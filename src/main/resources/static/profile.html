<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Divyansh Jaimini</title>
<script src="settings-apply.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg,#030308);color:var(--text,#fff);min-height:100vh}
canvas{position:fixed;top:0;left:0;z-index:0;pointer-events:none}
nav{position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:0 2rem;height:65px;background:var(--nav,rgba(3,3,8,0.9));backdrop-filter:blur(30px);border-bottom:1px solid var(--border,rgba(255,255,255,0.07))}
.nav-logo{font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,#667eea,#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-right{display:flex;align-items:center;gap:0.8rem}
.back-btn{color:var(--text2,rgba(255,255,255,0.45));text-decoration:none;font-size:0.85rem;padding:0.45rem 1rem;border-radius:10px;border:1px solid var(--border,rgba(255,255,255,0.07));transition:all 0.2s;cursor:pointer;background:none;font-family:inherit}
.back-btn:hover{color:var(--text,#fff)}
.main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:2rem 1.5rem}

/* SEARCH */
.search-section{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:1.5rem;margin-bottom:1.5rem;animation:fadeUp 0.5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.section-title{font-size:1rem;font-weight:800;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem}
.search-input{width:100%;padding:0.85rem 1rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;font-family:inherit;font-size:0.9rem;outline:none;transition:all 0.2s;margin-bottom:1rem}
.search-input:focus{border-color:rgba(102,126,234,0.5);background:rgba(102,126,234,0.05)}
.search-input::placeholder{color:rgba(255,255,255,0.2)}
.search-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.8rem}
.user-result{display:flex;align-items:center;gap:0.8rem;padding:0.8rem;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;cursor:pointer;transition:all 0.2s;text-decoration:none;color:inherit}
.user-result:hover{background:rgba(102,126,234,0.08);border-color:rgba(102,126,234,0.2);transform:translateY(-2px)}
.u-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#667eea,#f093fb);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;flex-shrink:0;overflow:hidden}
.u-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.u-name{font-size:0.88rem;font-weight:700}
.u-role{font-size:0.72rem;color:rgba(255,255,255,0.35)}

/* PROFILE HEADER */
.profile-header{background:linear-gradient(135deg,rgba(102,126,234,0.12),rgba(240,147,251,0.08));border:1px solid rgba(102,126,234,0.2);border-radius:24px;padding:2.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:2rem;animation:fadeUp 0.6s ease}
@media(max-width:600px){
    .profile-header{flex-direction:column;text-align:center;padding:1.5rem}
    .profile-stats{justify-content:center}
    .search-results{grid-template-columns:1fr 1fr}
    .posts-grid{grid-template-columns:1fr}
}
.p-avatar-wrap{position:relative;flex-shrink:0}
.p-avatar{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#667eea,#f093fb);display:flex;align-items:center;justify-content:center;font-size:2.8rem;font-weight:900;color:#fff;box-shadow:0 8px 30px rgba(102,126,234,0.4);overflow:hidden;cursor:pointer}
.p-avatar img{width:100%;height:100%;object-fit:cover}
.p-avatar-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;color:#fff;font-size:0.75rem;font-weight:600;text-align:center;cursor:pointer;flex-direction:column;gap:0.2rem}
.p-avatar-wrap:hover .p-avatar-overlay{display:flex}
.profile-name{font-size:2rem;font-weight:900;letter-spacing:-0.5px;margin-bottom:0.4rem}
.profile-role-badge{display:inline-flex;align-items:center;gap:0.4rem;padding:0.25rem 0.8rem;border-radius:20px;font-size:0.78rem;font-weight:700;margin-bottom:0.8rem}
.role-user{background:rgba(74,222,128,0.1);color:#4ade80;border:1px solid rgba(74,222,128,0.2)}
.role-admin{background:rgba(240,147,251,0.1);color:#f0abfc;border:1px solid rgba(240,147,251,0.2)}
.profile-joined{color:var(--text2,rgba(255,255,255,0.45));font-size:0.85rem;margin-bottom:1rem}
.profile-stats{display:flex;gap:2rem;flex-wrap:wrap}
.p-stat{text-align:center}
.p-stat-num{font-size:1.5rem;font-weight:900;background:linear-gradient(135deg,#667eea,#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.p-stat-lbl{font-size:0.7rem;color:var(--text2,rgba(255,255,255,0.45));margin-top:0.2rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em}

/* POSTS */
.posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-bottom:2rem}
.post-card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:1.5rem;cursor:pointer;transition:all 0.3s;animation:fadeUp 0.4s ease}
.post-card:hover{transform:translateY(-4px);border-color:rgba(102,126,234,0.3);box-shadow:0 15px 35px rgba(0,0,0,0.3)}
.post-cat{display:inline-block;padding:0.2rem 0.6rem;border-radius:15px;font-size:0.68rem;font-weight:700;margin-bottom:0.6rem;text-transform:uppercase}
.cat-Technology{background:rgba(102,126,234,0.15);color:#818cf8}
.cat-Coding{background:rgba(74,222,128,0.15);color:#4ade80}
.cat-Life{background:rgba(240,147,251,0.15);color:#f0abfc}
.cat-Other{background:rgba(253,160,133,0.15);color:#fda085}
.post-title{font-size:1rem;font-weight:700;margin-bottom:0.5rem;line-height:1.3}
.post-preview{color:rgba(255,255,255,0.42);font-size:0.83rem;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.post-date{font-size:0.75rem;color:rgba(255,255,255,0.25);margin-top:0.8rem}

/* EMPTY */
.not-found{text-align:center;padding:3rem;opacity:0.4;grid-column:1/-1}
.not-found h3{font-size:1.2rem;font-weight:700;margin-bottom:0.4rem}

/* TOAST */
.toast{position:fixed;bottom:2rem;right:2rem;padding:0.9rem 1.5rem;border-radius:12px;font-size:0.88rem;display:none;z-index:9999;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,0.4)}
.toast.ok{background:linear-gradient(135deg,#059669,#047857);color:#fff}
.toast.err{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff}
</style>
</head>
<body>
<canvas id="c"></canvas>

<nav>
    <div class="nav-logo">👤 Profile</div>
    <div class="nav-right">
        <button class="back-btn" onclick="history.back()">← Back</button>
    </div>
</nav>

<div class="main">
    <!-- SEARCH -->
    <div class="search-section">
        <div class="section-title">🔍 Search Users</div>
        <input class="search-input" id="searchInput" placeholder="Search by username..." oninput="searchUsers(this.value)">
        <div class="search-results" id="searchResults"></div>
    </div>

    <!-- PROFILE -->
    <div id="profileSection" style="display:none">
        <div class="profile-header">
            <div class="p-avatar-wrap">
                <div class="p-avatar" id="pAvatar">D</div>
                <div class="p-avatar-overlay" id="avatarOverlay" onclick="document.getElementById('photoInput').click()">
                    📷<span>Change Photo</span>
                </div>
                <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="uploadPhoto(this)">
            </div>
            <div>
                <div class="profile-name" id="pName">--</div>
                <div class="profile-role-badge role-user" id="pRole">USER</div>
                <div class="profile-joined" id="pJoined">--</div>
                <div class="profile-stats">
                    <div class="p-stat"><div class="p-stat-num" id="pPosts">0</div><div class="p-stat-lbl">Posts</div></div>
                    <div class="p-stat"><div class="p-stat-num" id="pLikes">0</div><div class="p-stat-lbl">Likes</div></div>
                </div>
            </div>
        </div>

        <div class="section-title">✍️ Posts by <span id="postsBy">--</span></div>
        <div class="posts-grid" id="userPostsGrid">
            <div class="not-found"><h3>Loading...</h3></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// PARTICLES
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});
const pts=Array.from({length:40},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1+0.3,dx:(Math.random()-.5)*.25,dy:(Math.random()-.5)*.25,c:['#667eea','#f093fb'][Math.floor(Math.random()*2)]}));
function drawP(){ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c+'22';ctx.fill()});requestAnimationFrame(drawP)}drawP();

const myUserId=localStorage.getItem('userId');
const myUsername=localStorage.getItem('username');
const myRole=localStorage.getItem('role');
const likesDB=JSON.parse(localStorage.getItem('blogLikes')||'{}');

if(!myUserId){
    window.location.href='login.html?redirect=profile.html';
}

// URL se username lo
const urlParams=new URLSearchParams(window.location.search);
const targetUser=urlParams.get('user');
if(targetUser) loadProfile(targetUser);

// SEARCH — Public API use karo
async function searchUsers(query){
    const results=document.getElementById('searchResults');
    if(!query.trim()){results.innerHTML='';return}
    try{
        const res=await fetch('https://divyansh-website-wooq.onrender.com/api/user/search?query='+encodeURIComponent(query));
        if(!res.ok){results.innerHTML='<div style="color:rgba(255,255,255,0.3);font-size:0.85rem;text-align:center;padding:1rem;grid-column:1/-1">Search unavailable</div>';return}
        const users=await res.json();
        if(!users.length){
            results.innerHTML='<div style="color:rgba(255,255,255,0.3);font-size:0.85rem;text-align:center;padding:1rem;grid-column:1/-1">No users found</div>';
            return;
        }
        results.innerHTML=users.map(u=>`
            <div class="user-result" onclick="loadProfile('${u.username}')">
                <div class="u-avatar" id="sa-${u.id}">${u.username.charAt(0).toUpperCase()}</div>
                <div>
                    <div class="u-name">${u.username}</div>
                    <div class="u-role">${u.role}</div>
                </div>
            </div>`).join('');
    }catch(e){
        results.innerHTML='<div style="color:rgba(255,255,255,0.3);font-size:0.85rem;text-align:center;padding:1rem;grid-column:1/-1">Search failed!</div>';
    }
}

// LOAD PROFILE
async function loadProfile(username){
    document.getElementById('profileSection').style.display='block';
    document.getElementById('pName').textContent=username;
    document.getElementById('postsBy').textContent=username;
    window.history.pushState({},'','profile.html?user='+username);
    document.getElementById('profileSection').scrollIntoView({behavior:'smooth'});

    // Upload button — sirf apni profile par
    const overlay=document.getElementById('avatarOverlay');
    if(username===myUsername&&myUserId){
        overlay.style.display='';
    } else {
        overlay.style.display='none';
    }

    // Blog posts load karo
    try{
        const res=await fetch('https://divyansh-website-wooq.onrender.com/api/blog/posts');
        const allPosts=await res.json();
        const userPosts=allPosts.filter(p=>p.author===username);
        document.getElementById('pPosts').textContent=userPosts.length;
        let totalLikes=0;
        userPosts.forEach(p=>totalLikes+=(likesDB[p.id]||0));
        document.getElementById('pLikes').textContent=totalLikes;
        if(!userPosts.length){
            document.getElementById('userPostsGrid').innerHTML='<div class="not-found"><h3>No posts yet</h3><p>This user has not posted anything.</p></div>';
        } else {
            document.getElementById('userPostsGrid').innerHTML=userPosts.map(p=>{
                const date=new Date(p.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
                return`<div class="post-card" onclick="window.location.href='blog.html'">
                    <span class="post-cat cat-${p.category}">${p.category}</span>
                    <div class="post-title">${p.title}</div>
                    <div class="post-preview">${p.content.substring(0,100)}...</div>
                    <div class="post-date">${date} · ❤️ ${likesDB[p.id]||0}</div>
                </div>`;
            }).join('');
        }
    }catch(e){
        document.getElementById('userPostsGrid').innerHTML='<div class="not-found"><h3>Could not load posts</h3></div>';
    }

    // User details — Public search API se
    try{
        const res=await fetch('https://divyansh-website-wooq.onrender.com/api/user/search?query='+encodeURIComponent(username));
        const users=await res.json();
        const user=users.find(u=>u.username===username);
        if(user){
            const isAdmin=user.role==='ADMIN';
            document.getElementById('pRole').textContent=user.role;
            document.getElementById('pRole').className='profile-role-badge '+(isAdmin?'role-admin':'role-user');
        }
    }catch(e){}

    // Profile photo load — apni profile ke liye
    if(myUserId&&username===myUsername){
        try{
            const res=await fetch('https://divyansh-website-wooq.onrender.com/api/user/profile',{
                headers:{'userId':myUserId}
            });
            const data=await res.json();
            if(data.profilePhoto){
                setAvatar(data.profilePhoto);
            }
            if(data.joinedOn){
                const date=new Date(data.joinedOn).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
                document.getElementById('pJoined').textContent='Joined '+date;
            }
        }catch(e){}
    }
}

function setAvatar(photoData){
    const el=document.getElementById('pAvatar');
    el.innerHTML='<img src="'+photoData+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
}

// PHOTO UPLOAD
async function uploadPhoto(input){
    const file=input.files[0];
    if(!file)return;
    if(file.size>5*1024*1024){showToast('Max 5MB!','err');return}

    showToast('Uploading photo...','ok');

    const formData=new FormData();
    formData.append('file',file);
    formData.append('upload_preset','divyansh-chat');
    formData.append('cloud_name','dyoqfgf8s');

    try{
        const res=await fetch('https://api.cloudinary.com/v1_1/dyoqfgf8s/image/upload',{
            method:'POST',
            body:formData
        });
        const data=await res.json();

        if(data.secure_url){
            // Backend mein save karo
            const saveRes=await fetch('https://divyansh-website-wooq.onrender.com/api/user/upload-photo',{
                method:'PUT',
                headers:{'Content-Type':'application/json','userId':myUserId},
                body:JSON.stringify({photo:data.secure_url})
            });

            if(saveRes.ok){
                setAvatar(data.secure_url);
                showToast('Profile photo updated! 📸','ok');
            }
        } else {
            showToast('Upload failed!','err');
        }
    }catch(e){
        showToast('Failed! Try again.','err');
        console.error(e);
    }
    input.value='';
}

function showToast(msg,type){
    const t=document.getElementById('toast');
    t.textContent=msg;t.className='toast '+type;t.style.display='block';
    setTimeout(()=>t.style.display='none',3000);
}
</script>
</body>
</html>
