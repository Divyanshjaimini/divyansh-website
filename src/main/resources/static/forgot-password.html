<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Divyansh Jaimini</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#030308;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
canvas{position:fixed;top:0;left:0;z-index:0;pointer-events:none}
.card{position:relative;z-index:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:28px;padding:3rem;width:100%;max-width:440px;margin:1rem;animation:fadeUp 0.6s ease;backdrop-filter:blur(30px)}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.back{display:inline-flex;align-items:center;gap:0.4rem;color:rgba(255,255,255,0.35);text-decoration:none;font-size:0.8rem;margin-bottom:2rem;transition:color 0.2s}
.back:hover{color:rgba(255,255,255,0.7)}
.brand{font-size:0.95rem;font-weight:900;background:linear-gradient(135deg,#667eea,#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1.8rem}
h2{font-size:2rem;font-weight:900;letter-spacing:-0.5px;margin-bottom:0.3rem}
.sub{color:rgba(255,255,255,0.35);font-size:0.85rem;margin-bottom:2rem}
.steps{display:flex;gap:0.5rem;margin-bottom:2rem}
.step{flex:1;height:3px;border-radius:3px;background:rgba(255,255,255,0.08);transition:all 0.3s}
.step.active{background:linear-gradient(90deg,#667eea,#f093fb)}
.step.done{background:#4ade80}
.fg{margin-bottom:1.1rem}
label{display:block;font-size:0.75rem;font-weight:700;color:rgba(255,255,255,0.45);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.08em}
input{width:100%;padding:0.9rem 1.1rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:14px;color:#fff;font-size:0.92rem;font-family:inherit;outline:none;transition:all 0.25s}
input:focus{border-color:rgba(102,126,234,0.6);background:rgba(102,126,234,0.07);box-shadow:0 0 0 4px rgba(102,126,234,0.1)}
input::placeholder{color:rgba(255,255,255,0.18)}
.btn{width:100%;padding:0.95rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:14px;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.3s;box-shadow:0 4px 20px rgba(102,126,234,0.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(102,126,234,0.5)}
.btn:disabled{opacity:0.7;cursor:not-allowed;transform:none}
.otp-wrap{display:flex;gap:0.5rem;justify-content:center;margin:1.5rem 0}
.otp-in{width:50px;height:55px;text-align:center;font-size:1.4rem;font-weight:800;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-family:inherit;outline:none;transition:all 0.2s}
.otp-in:focus{border-color:rgba(102,126,234,0.6);background:rgba(102,126,234,0.07);box-shadow:0 0 0 4px rgba(102,126,234,0.1)}
.otp-info{background:rgba(102,126,234,0.08);border:1px solid rgba(102,126,234,0.2);border-radius:14px;padding:1rem;text-align:center;margin-bottom:1.5rem;font-size:0.85rem;color:rgba(255,255,255,0.55)}
.otp-info strong{color:#a78bfa}
.msg{margin-top:1rem;padding:0.85rem 1rem;border-radius:12px;font-size:0.85rem;text-align:center;display:none}
.msg.success{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);color:#4ade80}
.msg.error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#f87171}
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:0.5rem;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.sec{display:none}.sec.active{display:block}
.strength-bar{height:3px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden;margin-top:0.5rem}
.strength-fill{height:100%;border-radius:3px;transition:all 0.3s;width:0}
.strength-txt{font-size:0.72rem;margin-top:0.3rem;font-weight:600}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="card">
    <a href="login.html" class="back">← Back to Login</a>
    <div class="brand">Divyansh Jaimini</div>
    <h2>Forgot Password? 🔑</h2>
    <p class="sub">Don't worry — we'll help you reset it!</p>
    <div class="steps">
        <div class="step active" id="s1"></div>
        <div class="step" id="s2"></div>
        <div class="step" id="s3"></div>
    </div>

    <!-- SEC 1: Email -->
    <div class="sec active" id="sec1">
        <div class="fg"><label>Your Email</label><input type="email" id="email" placeholder="your@email.com"></div>
        <button class="btn" onclick="sendOtp()" id="sendBtn">Send OTP →</button>
        <div class="msg" id="msg1"></div>
    </div>

    <!-- SEC 2: OTP -->
    <div class="sec" id="sec2">
        <div class="otp-info">OTP sent to <strong id="sentEmail"></strong><br>Check your inbox! Valid for 5 minutes.</div>
        <label style="text-align:center;display:block;margin-bottom:0.5rem">Enter 6-digit OTP</label>
        <div class="otp-wrap">
            <input class="otp-in" id="o1" maxlength="1" oninput="mn(this,'o2')" onkeydown="mp(event,this,'')">
            <input class="otp-in" id="o2" maxlength="1" oninput="mn(this,'o3')" onkeydown="mp(event,this,'o1')">
            <input class="otp-in" id="o3" maxlength="1" oninput="mn(this,'o4')" onkeydown="mp(event,this,'o2')">
            <input class="otp-in" id="o4" maxlength="1" oninput="mn(this,'o5')" onkeydown="mp(event,this,'o3')">
            <input class="otp-in" id="o5" maxlength="1" oninput="mn(this,'o6')" onkeydown="mp(event,this,'o4')">
            <input class="otp-in" id="o6" maxlength="1" oninput="mn(this,'')" onkeydown="mp(event,this,'o5')">
        </div>
        <button class="btn" onclick="verifyOtp()" id="verifyBtn">Verify OTP ✓</button>
        <div class="msg" id="msg2"></div>
    </div>

    <!-- SEC 3: New Password -->
    <div class="sec" id="sec3">
        <div class="fg">
            <label>New Password</label>
            <input type="password" id="newPw" placeholder="New password" oninput="checkStrength(this.value)">
            <div class="strength-bar"><div class="strength-fill" id="sFill"></div></div>
            <div class="strength-txt" id="sTxt"></div>
        </div>
        <div class="fg"><label>Confirm Password</label><input type="password" id="confirmPw" placeholder="Repeat new password"></div>
        <button class="btn" onclick="resetPassword()" id="resetBtn">Reset Password 🔐</button>
        <div class="msg" id="msg3"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
emailjs.init('lAz8t3QmaYBvtxNal');
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});
const pts=Array.from({length:50},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.2+0.3,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,c:['#667eea','#f093fb'][Math.floor(Math.random()*2)],o:Math.random()*0.3+0.1}));
function drawP(){ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c+Math.floor(p.o*255).toString(16).padStart(2,'0');ctx.fill()});requestAnimationFrame(drawP)}drawP();

function mn(cur,nxt){if(cur.value.length===1&&nxt)document.getElementById(nxt).focus()}
function mp(e,cur,prv){if(e.key==='Backspace'&&cur.value===''&&prv)document.getElementById(prv).focus()}

let userEmail='';
let savedOtp='';

function checkStrength(pw){
    const fill=document.getElementById('sFill'),txt=document.getElementById('sTxt');
    if(!pw){fill.style.width='0';txt.textContent='';return}
    let score=0;
    if(pw.length>=6)score++;if(pw.length>=10)score++;if(/[A-Z]/.test(pw))score++;if(/[0-9]/.test(pw))score++;if(/[^A-Za-z0-9]/.test(pw))score++;
    const levels=[{c:'#f87171',l:'Very Weak',w:'20%'},{c:'#fb923c',l:'Weak',w:'40%'},{c:'#fbbf24',l:'Medium',w:'60%'},{c:'#34d399',l:'Strong',w:'80%'},{c:'#4ade80',l:'Very Strong! 💪',w:'100%'}];
    const lv=levels[Math.min(score,4)];
    fill.style.width=lv.w;fill.style.background=lv.c;txt.style.color=lv.c;txt.textContent=lv.l;
}

async function sendOtp(){
    const email=document.getElementById('email').value.trim();
    const btn=document.getElementById('sendBtn');
    const msg=document.getElementById('msg1');
    if(!email){showMsg(msg,'Please enter your email!','error');return}
    const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!emailRegex.test(email)){showMsg(msg,'Please enter a valid email!','error');return}
    btn.innerHTML='<span class="loading"></span>Sending...';btn.disabled=true;
    try{
        const res=await fetch('https://divyansh-website-wooq.onrender.com/api/auth/forgot-password/send-otp',{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({email})
        });
        const data=await res.json();
        if(res.ok){
            userEmail=email;
            savedOtp=data.otp;
            // EmailJS se OTP bhejo
            await emailjs.send('service_6zv6pmo','template_fy0xgj9',{
                from_name:'Divyansh Website',
                from_email:'noreply@divyansh.com',
                message:`Your OTP for password reset is: ${data.otp}\n\nThis OTP is valid for 5 minutes.`,
                to_name:email
            });
            document.getElementById('sentEmail').textContent=email;
            document.getElementById('sec1').classList.remove('active');
            document.getElementById('sec2').classList.add('active');
            document.getElementById('s1').classList.add('done');
            document.getElementById('s2').classList.add('active');
            document.getElementById('o1').focus();
        }else{
            showMsg(msg,'❌ '+data.message,'error');
            btn.innerHTML='Send OTP →';btn.disabled=false;
        }
    }catch(e){
        showMsg(msg,'❌ Failed to send OTP!','error');
        btn.innerHTML='Send OTP →';btn.disabled=false;
    }
}

function verifyOtp(){
    const otp=document.getElementById('o1').value+document.getElementById('o2').value+document.getElementById('o3').value+document.getElementById('o4').value+document.getElementById('o5').value+document.getElementById('o6').value;
    const msg=document.getElementById('msg2');
    if(otp.length!==6){showMsg(msg,'Please enter 6-digit OTP!','error');return}
    if(otp===savedOtp){
        document.getElementById('sec2').classList.remove('active');
        document.getElementById('sec3').classList.add('active');
        document.getElementById('s2').classList.add('done');
        document.getElementById('s3').classList.add('active');
    }else{
        showMsg(msg,'❌ Wrong OTP! Please check your email.','error');
    }
}

async function resetPassword(){
    const newPw=document.getElementById('newPw').value;
    const confirmPw=document.getElementById('confirmPw').value;
    const btn=document.getElementById('resetBtn');
    const msg=document.getElementById('msg3');
    if(!newPw||!confirmPw){showMsg(msg,'Please fill all fields!','error');return}
    if(newPw!==confirmPw){showMsg(msg,'Passwords do not match!','error');return}
    if(newPw.length<6){showMsg(msg,'Password must be at least 6 characters!','error');return}
    btn.innerHTML='<span class="loading"></span>Resetting...';btn.disabled=true;
    try{
        const res=await fetch('https://divyansh-website-wooq.onrender.com/api/auth/forgot-password/reset',{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({email:userEmail,otp:savedOtp,newPassword:newPw})
        });
        const data=await res.json();
        if(res.ok){
            showMsg(msg,'✅ Password reset! Going to login...','success');
            document.getElementById('s3').classList.add('done');
            setTimeout(()=>window.location.href='login.html',2000);
        }else{
            showMsg(msg,'❌ '+data.message,'error');
            btn.innerHTML='Reset Password 🔐';btn.disabled=false;
        }
    }catch(e){
        showMsg(msg,'❌ Failed! Try again.','error');
        btn.innerHTML='Reset Password 🔐';btn.disabled=false;
    }
}

function showMsg(el,txt,type){el.textContent=txt;el.className='msg '+type;el.style.display='block'}
</script>
</body>
</html>
