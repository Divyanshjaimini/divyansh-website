<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Divyansh Jaimini</title>
<style>

/* GLOBAL THEMES */
:root[data-theme="dark"]{--bg:#030308;--bg2:#0a0a14;--bg3:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);--text:#fff;--text2:rgba(255,255,255,0.45);--card:rgba(255,255,255,0.025)}
:root[data-theme="light"]{--bg:#f0f2ff;--bg2:#fff;--bg3:rgba(102,126,234,0.06);--border:rgba(102,126,234,0.12);--text:#1a1a2e;--text2:#666688;--card:#fff}
:root[data-theme="blue"]{--bg:#010b1a;--bg2:#021224;--bg3:rgba(0,150,255,0.06);--border:rgba(0,150,255,0.12);--text:#e0f0ff;--text2:rgba(224,240,255,0.5);--card:rgba(0,150,255,0.04)}
:root[data-theme="green"]{--bg:#010f08;--bg2:#021a0d;--bg3:rgba(0,200,100,0.06);--border:rgba(0,200,100,0.12);--text:#e0ffe8;--text2:rgba(224,255,232,0.5);--card:rgba(0,200,100,0.04)}
:root[data-theme="purple"]{--bg:#08010f;--bg2:#12021a;--bg3:rgba(150,0,255,0.06);--border:rgba(150,0,255,0.12);--text:#f0e0ff;--text2:rgba(240,224,255,0.5);--card:rgba(150,0,255,0.04)}
:root[data-theme="sunset"]{--bg:#0f0500;--bg2:#1a0a00;--bg3:rgba(255,100,0,0.06);--border:rgba(255,100,0,0.12);--text:#fff0e0;--text2:rgba(255,240,224,0.5);--card:rgba(255,100,0,0.04)}
.compact *{padding:0.5em!important;margin:0.3em!important}

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#030308;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
canvas{position:fixed;top:0;left:0;z-index:0;pointer-events:none}
.card{position:relative;z-index:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:28px;padding:3rem;width:100%;max-width:440px;margin:1rem;animation:fadeUp 0.6s ease;backdrop-filter:blur(30px)}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.back{display:inline-flex;align-items:center;gap:0.4rem;color:rgba(255,255,255,0.35);text-decoration:none;font-size:0.8rem;margin-bottom:2rem;transition:color 0.2s}
.back:hover{color:rgba(255,255,255,0.7)}
.brand{font-size:0.95rem;font-weight:900;background:linear-gradient(135deg,#667eea,#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1.8rem}
h2{font-size:2rem;font-weight:900;letter-spacing:-0.5px;margin-bottom:0.3rem}
.sub{color:rgba(255,255,255,0.35);font-size:0.85rem;margin-bottom:2.5rem}
.fg{margin-bottom:1.1rem}
label{display:block;font-size:0.78rem;font-weight:600;color:rgba(255,255,255,0.5);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.08em}
input{width:100%;padding:0.9rem 1.1rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:14px;color:#fff;font-size:0.92rem;font-family:inherit;outline:none;transition:all 0.25s}
input:focus{border-color:rgba(102,126,234,0.6);background:rgba(102,126,234,0.07);box-shadow:0 0 0 4px rgba(102,126,234,0.1)}
input::placeholder{color:rgba(255,255,255,0.18)}
.btn{width:100%;padding:0.95rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:14px;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:0.5rem;transition:all 0.3s;box-shadow:0 4px 20px rgba(102,126,234,0.3);position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transition:left 0.5s}
.btn:hover::before{left:100%}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(102,126,234,0.5)}
.btn:disabled{opacity:0.7;cursor:not-allowed;transform:none}
.msg{margin-top:1rem;padding:0.85rem 1rem;border-radius:12px;font-size:0.85rem;text-align:center;display:none;animation:fadeUp 0.3s ease}
.msg.success{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);color:#4ade80}
.msg.error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#f87171}
.divider{display:flex;align-items:center;gap:1rem;margin:1.8rem 0;color:rgba(255,255,255,0.15);font-size:0.78rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07)}
.bottom{text-align:center;font-size:0.85rem;color:rgba(255,255,255,0.35)}
.bottom a{color:#a78bfa;text-decoration:none;font-weight:600}
.bottom a:hover{text-decoration:underline}
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:0.5rem;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<script src="/settings-apply.js"></script>

</head>
<body>
<canvas id="c"></canvas>
<div class="card">
    <a href="index.html" class="back">← Back to Home</a>
    <div class="brand">Divyansh Jaimini</div>
    <h2>Welcome Back! 👋</h2>
    <p class="sub">Login to your account</p>
    <div class="fg"><label>Email Address</label><input type="email" id="email" placeholder="your@email.com"></div>
    
    <div class="fg"><label>Password</label><input type="password" id="password" placeholder="Your password" onkeydown="if(event.key==='Enter')login()"></div>
    <div style="text-align:right;margin-top:0.5rem;margin-bottom:0.5rem">
    <a href="forgot-password.html" style="color:#a78bfa;text-decoration:none;font-size:0.82rem;font-weight:600">Forgot Password?</a>
   </div>
    <button class="btn" onclick="login()" id="loginBtn">Login</button>
    <div class="msg" id="msg"></div>
    <div class="divider">or</div>
    <div style="text-align:right;margin-bottom:1rem">
      <a href="forgot-password.html" style="color:#a78bfa;text-decoration:none;font-size:0.82rem;font-weight:500">Forgot Password?</a>
  </div>
    <div class="bottom">Don't have an account? <a href="register.html">Register here</a></div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});
const pts=Array.from({length:60},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.2+0.3,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,c:['#667eea','#f093fb','#f5576c'][Math.floor(Math.random()*3)],o:Math.random()*0.3+0.1}));
function drawP(){ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c+Math.floor(p.o*255).toString(16).padStart(2,'0');ctx.fill()});requestAnimationFrame(drawP)}drawP();
async function login(){
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    const msg=document.getElementById('msg');
    const btn=document.getElementById('loginBtn');
    if(!email||!password){showMsg('Please fill all fields!','error');return}
    btn.innerHTML='<span class="loading"></span>Logging in...';btn.disabled=true;
    try{
        const res=await fetch('https://divyansh-website-wooq.onrender.com/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
        const data=await res.json();
        if(res.ok){
            localStorage.setItem('userId',data.userId);localStorage.setItem('username',data.username);localStorage.setItem('role',data.role);
            
         // Settings preserve karo — login ke baad bhi rahe
            const savedSettings=localStorage.getItem('siteSettings');
            const savedTheme=localStorage.getItem('theme');
            
            showMsg('✅ Login successful! Redirecting...','success');
            setTimeout(()=>window.location.href=data.role==='ADMIN'?'admin-dashboard.html':'user-dashboard.html',1000);
        }else{showMsg('❌ '+data.message,'error');btn.innerHTML='Login';btn.disabled=false}
    }catch(e){showMsg('❌ Server connection failed!','error');btn.innerHTML='Login';btn.disabled=false}
}
function showMsg(text,type){const msg=document.getElementById('msg');msg.textContent=text;msg.className='msg '+type;msg.style.display='block'}
</script>
</body>
</html>
