<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Divyansh Jaimini</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { opacity: 0.5; margin-bottom: 2rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; opacity: 0.8; }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #667eea; }
        .btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn:hover { opacity: 0.9; }
        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        .success { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .error { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            opacity: 0.6;
        }
        .register-link a { color: #a78bfa; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Welcome Back!</h2>
        <p class="subtitle">Apne account mein login karo</p>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="tumhara@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Tumhara password">
        </div>

        <button class="btn" onclick="login()">Login Karo</button>

        <div class="message" id="msg"></div>

        <div class="register-link">
            Naya account chahiye? <a href="register.html">Register karo</a>
        </div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            try {
                const res = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                msg.style.display = 'block';

                if (res.ok) {
                    // Save user info
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role);

                    msg.className = 'message success';
                    msg.textContent = 'Login successful! Redirect ho raha hai...';

                    // Role ke hisab se redirect
                    setTimeout(() => {
                        if (data.role === 'ADMIN') {
                            window.location.href = 'admin-dashboard.html';
                        } else {
                            window.location.href = 'user-dashboard.html';
                        }
                    }, 1000);
                } else {
                    msg.className = 'message error';
                    msg.textContent = data.message;
                }
            } catch (e) {
                msg.style.display = 'block';
                msg.className = 'message error';
                msg.textContent = 'Server se connect nahi ho pa raha!';
            }
        }
    </script>
</body>
</html>
