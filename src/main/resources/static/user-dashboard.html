<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - Divyansh Jaimini</title>
    <style>
        :root[data-theme="dark"] {
            --bg: #0a0a14;
            --bg2: #12121f;
            --bg3: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --text: #ffffff;
            --text2: rgba(255,255,255,0.55);
            --card: rgba(255,255,255,0.03);
            --nav: rgba(10,10,20,0.95);
        }
        :root[data-theme="light"] {
            --bg: #f0f2ff;
            --bg2: #ffffff;
            --bg3: rgba(102,126,234,0.06);
            --border: rgba(102,126,234,0.15);
            --text: #1a1a2e;
            --text2: #555577;
            --card: #ffffff;
            --nav: rgba(240,242,255,0.95);
        }
        * { margin:0; padding:0; box-sizing:border-box; transition: background 0.3s, color 0.3s, border-color 0.3s; }
        body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

        nav {
            display:flex; justify-content:space-between; align-items:center;
            padding:1rem 2rem;
            background:var(--nav);
            backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
            position:sticky; top:0; z-index:100;
        }
        .logo {
            font-size:1.2rem; font-weight:800;
            background:linear-gradient(135deg,#667eea,#f093fb);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .nav-right { display:flex; align-items:center; gap:0.8rem; }
        .username-badge {
            background:var(--bg3); border:1px solid var(--border);
            padding:0.4rem 1rem; border-radius:20px;
            font-size:0.85rem; color:var(--text2);
        }

        /* THEME TOGGLE */
        .theme-toggle {
            width:48px; height:26px;
            background:var(--bg3); border:1px solid var(--border);
            border-radius:13px; cursor:pointer;
            position:relative; outline:none;
            transition:background 0.3s;
        }
        .theme-toggle::after {
            content:''; position:absolute;
            top:3px; left:3px;
            width:18px; height:18px;
            background:linear-gradient(135deg,#667eea,#f093fb);
            border-radius:50%;
            transition:transform 0.3s;
        }
        [data-theme="light"] .theme-toggle::after { transform:translateX(22px); }
        .theme-icon { font-size:1rem; cursor:pointer; }

        .logout-btn {
            background:rgba(239,68,68,0.12); color:#f87171;
            border:1px solid rgba(239,68,68,0.25);
            padding:0.45rem 1rem; border-radius:8px;
            cursor:pointer; font-size:0.85rem;
            transition:all 0.2s;
        }
        .logout-btn:hover { background:rgba(239,68,68,0.2); }

        .main { padding:2rem; max-width:1000px; margin:0 auto; }

        /* WELCOME */
        .welcome-card {
            background:linear-gradient(135deg,rgba(102,126,234,0.15),rgba(240,147,251,0.1));
            border:1px solid rgba(102,126,234,0.25);
            border-radius:20px; padding:2rem;
            margin-bottom:1.5rem;
            position:relative; overflow:hidden;
            animation: slideDown 0.5s ease;
        }
        .welcome-card::before {
            content:'';
            position:absolute; top:-50%; right:-10%;
            width:300px; height:300px;
            background:radial-gradient(circle,rgba(102,126,234,0.15),transparent 70%);
            border-radius:50%;
        }
        .welcome-card h1 { font-size:1.7rem; margin-bottom:0.4rem; }
        .welcome-card p { color:var(--text2); font-size:0.95rem; }
        .welcome-name { color:#a78bfa; }

        /* STATS */
        .stats-grid {
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
            gap:1rem; margin-bottom:1.5rem;
        }
        .stat-card {
            background:var(--card); border:1px solid var(--border);
            border-radius:16px; padding:1.3rem;
            text-align:center;
            animation:fadeUp 0.5s ease both;
            transition:transform 0.2s, border-color 0.2s;
        }
        .stat-card:hover { transform:translateY(-3px); border-color:rgba(102,126,234,0.35); }
        .stat-icon { font-size:1.8rem; margin-bottom:0.5rem; }
        .stat-value { font-size:1.3rem; font-weight:700; color:#a78bfa; }
        .stat-label { font-size:0.78rem; color:var(--text2); margin-top:0.2rem; }

        /* TABS */
        .tabs {
            display:flex; gap:0.5rem;
            margin-bottom:1.5rem;
            background:var(--bg3); border:1px solid var(--border);
            border-radius:14px; padding:0.4rem;
        }
        .tab {
            flex:1; padding:0.6rem 1rem;
            border:none; border-radius:10px;
            background:transparent; color:var(--text2);
            cursor:pointer; font-size:0.9rem;
            transition:all 0.2s;
        }
        .tab.active {
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white; font-weight:600;
        }
        .tab-content { display:none; animation:fadeUp 0.3s ease; }
        .tab-content.active { display:block; }

        /* PROFILE CARD */
        .profile-card {
            background:var(--card); border:1px solid var(--border);
            border-radius:20px; padding:2rem;
            margin-bottom:1rem;
        }
        .profile-header {
            display:flex; align-items:center; gap:1.2rem;
            margin-bottom:1.5rem;
        }
        .avatar {
            width:60px; height:60px; border-radius:50%;
            background:linear-gradient(135deg,#667eea,#764ba2);
            display:flex; align-items:center; justify-content:center;
            font-size:1.5rem; font-weight:700; color:white;
        }
        .profile-name { font-size:1.2rem; font-weight:700; }
        .profile-email { color:var(--text2); font-size:0.85rem; margin-top:0.2rem; }
        .profile-row {
            display:flex; justify-content:space-between; align-items:center;
            padding:0.9rem 0;
            border-bottom:1px solid var(--border);
            font-size:0.9rem;
        }
        .profile-row:last-child { border-bottom:none; }
        .profile-label { color:var(--text2); }
        .profile-value { font-weight:500; }
        .role-badge {
            background:rgba(34,197,94,0.15); color:#4ade80;
            border:1px solid rgba(34,197,94,0.25);
            padding:0.2rem 0.8rem; border-radius:20px; font-size:0.8rem;
        }

        /* EDIT USERNAME */
        .edit-row {
            display:flex; gap:0.5rem; align-items:center;
            margin-top:1rem;
        }
        .edit-input {
            flex:1; padding:0.6rem 0.9rem;
            background:var(--bg3); border:1px solid var(--border);
            border-radius:10px; color:var(--text);
            font-size:0.9rem; outline:none;
        }
        .edit-input:focus { border-color:#667eea; }
        .save-btn {
            padding:0.6rem 1.2rem;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white; border:none; border-radius:10px;
            cursor:pointer; font-size:0.85rem;
        }

        /* PASSWORD CHANGE */
        .password-card {
            background:var(--card); border:1px solid var(--border);
            border-radius:20px; padding:2rem;
        }
        .password-card h3 { font-size:1.1rem; margin-bottom:1.2rem; }
        .pw-group { margin-bottom:1rem; }
        .pw-group label { display:block; font-size:0.85rem; color:var(--text2); margin-bottom:0.4rem; }
        .pw-group input {
            width:100%; padding:0.8rem 1rem;
            background:var(--bg3); border:1px solid var(--border);
            border-radius:12px; color:var(--text);
            font-size:0.9rem; outline:none;
        }
        .pw-group input:focus { border-color:#667eea; }
        .pw-btn {
            width:100%; padding:0.85rem;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white; border:none; border-radius:12px;
            font-size:0.95rem; cursor:pointer; font-weight:600;
            margin-top:0.5rem; transition:opacity 0.2s, transform 0.2s;
        }
        .pw-btn:hover { opacity:0.9; transform:translateY(-1px); }

        /* TOAST */
        .toast {
            position:fixed; bottom:2rem; right:2rem;
            padding:0.9rem 1.5rem; border-radius:12px;
            font-size:0.9rem; display:none; z-index:999;
            animation:slideUp 0.3s ease;
            box-shadow:0 8px 30px rgba(0,0,0,0.3);
        }
        .toast.success { background:linear-gradient(135deg,#059669,#047857); color:white; }
        .toast.error { background:linear-gradient(135deg,#dc2626,#b91c1c); color:white; }

        /* MSG */
        .msg-box {
            padding:0.8rem 1rem; border-radius:10px;
            font-size:0.88rem; margin-top:0.8rem; display:none;
        }
        .msg-success { background:rgba(34,197,94,0.12); color:#4ade80; border:1px solid rgba(34,197,94,0.2); }
        .msg-error { background:rgba(239,68,68,0.12); color:#f87171; border:1px solid rgba(239,68,68,0.2); }

        /* ANIMATIONS */
        @keyframes slideDown { from{opacity:0;transform:translateY(-15px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>
<body>

<nav>
    <div class="logo">Divyansh Jaimini</div>
    <div class="nav-right">
        <span class="username-badge" id="nav-username">Loading...</span>
        <span class="theme-icon" onclick="toggleTheme()" title="Theme toggle">🌙</span>
        <button class="theme-toggle" onclick="toggleTheme()"></button>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="main">
    <div class="welcome-card">
        <h1>Welcome, <span class="welcome-name" id="welcome-name">User</span>! 👋</h1>
        <p>Tumhara personal dashboard — sab kuch yahan manage karo.</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card" style="animation-delay:0.1s">
            <div class="stat-icon">📅</div>
            <div class="stat-value" id="join-date">--</div>
            <div class="stat-label">Member Since</div>
        </div>
        <div class="stat-card" style="animation-delay:0.2s">
            <div class="stat-icon">✅</div>
            <div class="stat-value">Active</div>
            <div class="stat-label">Account Status</div>
        </div>
        <div class="stat-card" style="animation-delay:0.3s">
            <div class="stat-icon">⭐</div>
            <div class="stat-value" id="stat-role">Member</div>
            <div class="stat-label">Your Role</div>
        </div>
        <div class="stat-card" style="animation-delay:0.4s">
            <div class="stat-icon">🆔</div>
            <div class="stat-value" id="stat-id">--</div>
            <div class="stat-label">User ID</div>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab active" onclick="showTab('profile', this)">👤 Profile</button>
        <button class="tab" onclick="showTab('password', this)">🔐 Password Change</button>
    </div>

    <!-- PROFILE TAB -->
    <div class="tab-content active" id="tab-profile">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar" id="avatar-letter">D</div>
                <div>
                    <div class="profile-name" id="p-username">--</div>
                    <div class="profile-email" id="p-email">--</div>
                </div>
            </div>
            <div class="profile-row">
                <span class="profile-label">Username</span>
                <span class="profile-value" id="pv-username">--</span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Email</span>
                <span class="profile-value" id="pv-email">--</span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Role</span>
                <span class="profile-value"><span class="role-badge" id="pv-role">USER</span></span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Joined On</span>
                <span class="profile-value" id="pv-joined">--</span>
            </div>

            <div class="edit-row">
                <input class="edit-input" id="new-username" placeholder="Naya username likho...">
                <button class="save-btn" onclick="updateUsername()">Save</button>
            </div>
            <div class="msg-box" id="username-msg"></div>
        </div>
    </div>

    <!-- PASSWORD TAB -->
    <div class="tab-content" id="tab-password">
        <div class="password-card">
            <h3>🔐 Password Change Karo</h3>
            <div class="pw-group">
                <label>Purana Password</label>
                <input type="password" id="old-pw" placeholder="Current password">
            </div>
            <div class="pw-group">
                <label>Naya Password</label>
                <input type="password" id="new-pw" placeholder="New password">
            </div>
            <div class="pw-group">
                <label>Naya Password Confirm Karo</label>
                <input type="password" id="confirm-pw" placeholder="Repeat new password">
            </div>
            <button class="pw-btn" onclick="changePassword()">🔐 Password Change Karo</button>
            <div class="msg-box" id="pw-msg"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const userId = localStorage.getItem('userId');
    const username = localStorage.getItem('username');
    const role = localStorage.getItem('role');
    if (!userId) window.location.href = 'login.html';
    if (role === 'ADMIN') window.location.href = 'admin-dashboard.html';

    document.getElementById('nav-username').textContent = username;
    document.getElementById('welcome-name').textContent = username;

    // THEME
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        document.querySelector('.theme-icon').textContent = next === 'dark' ? '🌙' : '☀️';
    }
    document.querySelector('.theme-icon').textContent = savedTheme === 'dark' ? '🌙' : '☀️';

    // LOAD PROFILE
    fetch('https://divyansh-website-wooq.onrender.com/api/user/profile', { headers: { 'userId': userId } })
        .then(r => r.json())
        .then(data => {
            document.getElementById('p-username').textContent = data.username;
            document.getElementById('p-email').textContent = data.email;
            document.getElementById('pv-username').textContent = data.username;
            document.getElementById('pv-email').textContent = data.email;
            document.getElementById('pv-role').textContent = data.role;
            document.getElementById('stat-role').textContent = data.role;
            document.getElementById('stat-id').textContent = '#' + data.id;
            document.getElementById('avatar-letter').textContent = data.username.charAt(0).toUpperCase();
            const date = new Date(data.joinedOn);
            const formatted = date.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
            document.getElementById('join-date').textContent = formatted;
            document.getElementById('pv-joined').textContent = formatted;
        });

    // TABS
    function showTab(name, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        btn.classList.add('active');
    }

    // UPDATE USERNAME
    function updateUsername() {
        const newUsername = document.getElementById('new-username').value.trim();
        const msgBox = document.getElementById('username-msg');
        if (!newUsername) { showMsg(msgBox, 'Username likho!', 'error'); return; }

        fetch('https://divyansh-website-wooq.onrender.com/api/user/update-profile', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'userId': userId },
            body: JSON.stringify({ username: newUsername })
        })
        .then(r => r.json())
        .then(data => {
            if (data.username) {
                localStorage.setItem('username', data.username);
                document.getElementById('p-username').textContent = data.username;
                document.getElementById('pv-username').textContent = data.username;
                document.getElementById('nav-username').textContent = data.username;
                document.getElementById('welcome-name').textContent = data.username;
                document.getElementById('avatar-letter').textContent = data.username.charAt(0).toUpperCase();
                document.getElementById('new-username').value = '';
                showMsg(msgBox, '✅ ' + data.message, 'success');
                showToast('Username update ho gaya!', 'success');
            } else {
                showMsg(msgBox, '❌ ' + data.message, 'error');
            }
        });
    }

    // CHANGE PASSWORD
    function changePassword() {
        const oldPw = document.getElementById('old-pw').value;
        const newPw = document.getElementById('new-pw').value;
        const confirmPw = document.getElementById('confirm-pw').value;
        const msgBox = document.getElementById('pw-msg');

        if (!oldPw || !newPw || !confirmPw) { showMsg(msgBox, 'Sab fields bharo!', 'error'); return; }
        if (newPw !== confirmPw) { showMsg(msgBox, 'Naya password match nahi kar raha!', 'error'); return; }
        if (newPw.length < 6) { showMsg(msgBox, 'Password kam se kam 6 characters ka hona chahiye!', 'error'); return; }

        fetch('https://divyansh-website-wooq.onrender.com/api/user/change-password', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'userId': userId },
            body: JSON.stringify({ oldPassword: oldPw, newPassword: newPw })
        })
        .then(r => r.json())
        .then(data => {
            if (data.message.includes('successfully')) {
                showMsg(msgBox, '✅ ' + data.message, 'success');
                showToast('Password change ho gaya!', 'success');
                document.getElementById('old-pw').value = '';
                document.getElementById('new-pw').value = '';
                document.getElementById('confirm-pw').value = '';
            } else {
                showMsg(msgBox, '❌ ' + data.message, 'error');
            }
        });
    }

    function showMsg(el, text, type) {
        el.textContent = text;
        el.className = 'msg-box msg-' + type;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }

    function showToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast ' + type;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
