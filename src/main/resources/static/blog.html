<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Divyansh Jaimini</title>
<script src="settings-apply.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg,#030308);color:var(--text,#fff);min-height:100vh}
canvas{position:fixed;top:0;left:0;z-index:0;pointer-events:none}

/* NAV */
nav{position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:1000;width:calc(100% - 4rem);max-width:1200px;padding:0.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between;background:rgba(3,3,8,0.85);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.08);border-radius:20px}
.nav-logo{font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,#667eea,#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;align-items:center;gap:0.5rem}
.nav-link{color:rgba(255,255,255,0.6);text-decoration:none;padding:0.45rem 0.9rem;border-radius:10px;font-size:0.85rem;font-weight:500;transition:all 0.2s}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.08)}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:5px}
.hamburger span{display:block;width:24px;height:2px;background:#fff;border-radius:2px}
.mobile-menu{display:none;position:fixed;inset:0;background:rgba(3,3,8,0.98);backdrop-filter:blur(20px);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem}
.mobile-menu.open{display:flex}
.mobile-menu a{color:#fff;text-decoration:none;font-size:1.4rem;font-weight:700;opacity:0.8}
.mobile-close{position:absolute;top:2rem;right:2rem;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer}

/* MAIN */
.main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:7rem 1.5rem 4rem}

/* HEADER */
.blog-header{text-align:center;margin-bottom:3rem;animation:fadeUp 0.6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.blog-tag{display:inline-flex;align-items:center;gap:0.5rem;background:rgba(102,126,234,0.1);border:1px solid rgba(102,126,234,0.3);color:#a78bfa;padding:0.4rem 1.2rem;border-radius:30px;font-size:0.8rem;font-weight:600;margin-bottom:1.2rem}
.blog-header h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;letter-spacing:-1px;margin-bottom:0.8rem}
.blog-header p{color:rgba(255,255,255,0.45);font-size:1rem;max-width:400px;margin:0 auto}
.grad{background:linear-gradient(135deg,#667eea,#f093fb,#f5576c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* CATEGORIES */
.categories{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:2rem}
.cat-btn{padding:0.5rem 1rem;border-radius:25px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-size:0.82rem;font-weight:600;font-family:inherit;transition:all 0.2s}
.cat-btn.active,.cat-btn:hover{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent}

/* CREATE POST */
.create-section{background:rgba(102,126,234,0.06);border:1px solid rgba(102,126,234,0.2);border-radius:20px;padding:1.5rem;margin-bottom:2rem;display:none}
.create-section.show{display:block}
.create-tabs{display:flex;gap:0.5rem;margin-bottom:1.2rem}
.c-tab{padding:0.5rem 1rem;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-size:0.85rem;font-weight:600;transition:all 0.2s;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5)}
.c-tab.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.create-form{display:none}.create-form.active{display:block}
.c-input,.c-textarea,.c-select{width:100%;padding:0.8rem 1rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;font-family:inherit;font-size:0.9rem;outline:none;margin-bottom:0.8rem;transition:all 0.2s}
.c-input:focus,.c-textarea:focus,.c-select:focus{border-color:rgba(102,126,234,0.5)}
.c-input::placeholder,.c-textarea::placeholder{color:rgba(255,255,255,0.2)}
.c-textarea{height:120px;resize:none}
.c-select option{background:#0a0a14}
.pub-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:0.8rem 2rem;border:none;border-radius:12px;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s}
.pub-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,0.4)}

/* POSTS */
.posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem}
.post-card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:1.8rem;transition:all 0.3s;cursor:pointer;position:relative;overflow:hidden;animation:fadeUp 0.5s ease}
.post-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#667eea,#f093fb);transform:scaleX(0);transition:transform 0.3s;transform-origin:left}
.post-card:hover{transform:translateY(-5px);border-color:rgba(102,126,234,0.3);box-shadow:0 20px 40px rgba(0,0,0,0.3)}
.post-card:hover::before{transform:scaleX(1)}
.post-cat-badge{display:inline-block;padding:0.22rem 0.7rem;border-radius:20px;font-size:0.7rem;font-weight:700;margin-bottom:0.8rem;text-transform:uppercase;letter-spacing:0.08em}
.cat-Technology{background:rgba(102,126,234,0.15);color:#818cf8;border:1px solid rgba(102,126,234,0.25)}
.cat-Coding{background:rgba(74,222,128,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.25)}
.cat-Life{background:rgba(240,147,251,0.15);color:#f0abfc;border:1px solid rgba(240,147,251,0.25)}
.cat-Other{background:rgba(253,160,133,0.15);color:#fda085;border:1px solid rgba(253,160,133,0.25)}
.post-title{font-size:1.1rem;font-weight:800;margin-bottom:0.7rem;line-height:1.3;letter-spacing:-0.3px}
.post-preview{color:rgba(255,255,255,0.42);font-size:0.87rem;line-height:1.65;margin-bottom:1.2rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.post-footer{display:flex;align-items:center;justify-content:space-between;font-size:0.78rem}
.post-author-wrap{display:flex;align-items:center;gap:0.5rem;color:rgba(255,255,255,0.4)}
.p-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#667eea,#f093fb);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:800;overflow:hidden;flex-shrink:0}
.post-date{color:rgba(255,255,255,0.3);font-size:0.75rem}
.del-btn{background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.2);padding:0.22rem 0.6rem;border-radius:8px;cursor:pointer;font-size:0.7rem;font-weight:600;font-family:inherit}
.read-more{color:#a78bfa;font-size:0.8rem;font-weight:600;margin-top:0.8rem;display:block}
.likes-wrap{display:flex;align-items:center;gap:0.4rem;color:rgba(255,255,255,0.4);font-size:0.78rem}
.like-btn{background:none;border:none;cursor:pointer;font-size:1rem;transition:transform 0.2s;padding:0}
.like-btn:hover{transform:scale(1.3)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(15px);z-index:9999;display:none;align-items:center;justify-content:center;padding:1.5rem}
.modal-overlay.open{display:flex}
.modal{background:#0a0a14;border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:2.5rem;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;animation:fadeUp 0.3s ease;position:relative}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.modal-close-btn{position:absolute;top:1.2rem;right:1.2rem;width:34px;height:34px;background:rgba(255,255,255,0.07);border:none;border-radius:50%;cursor:pointer;color:#fff;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.modal-close-btn:hover{background:rgba(255,255,255,0.12)}
.modal-title{font-size:1.8rem;font-weight:900;letter-spacing:-0.5px;margin:1rem 0;line-height:1.2}
.modal-meta{color:rgba(255,255,255,0.35);font-size:0.82rem;margin-bottom:1.5rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.modal-content{color:rgba(255,255,255,0.7);line-height:1.9;font-size:0.95rem;white-space:pre-wrap;word-break:break-word}

/* COMMENTS */
.comments-section{margin-top:2rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,0.07)}
.comments-title{font-size:1rem;font-weight:700;margin-bottom:1rem;color:rgba(255,255,255,0.7)}
.comment-input-wrap{display:flex;gap:0.6rem;margin-bottom:1rem}
.comment-input{flex:1;padding:0.7rem 1rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;font-family:inherit;font-size:0.88rem;outline:none}
.comment-input:focus{border-color:rgba(102,126,234,0.4)}
.comment-input::placeholder{color:rgba(255,255,255,0.2)}
.comment-send{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;padding:0.7rem 1.2rem;cursor:pointer;font-weight:700;font-family:inherit;font-size:0.85rem;white-space:nowrap}
.comment-item{padding:0.8rem;background:rgba(255,255,255,0.03);border-radius:12px;margin-bottom:0.6rem;border:1px solid rgba(255,255,255,0.06)}
.comment-author{font-size:0.78rem;font-weight:700;color:#a78bfa;margin-bottom:0.3rem}
.comment-text{font-size:0.88rem;color:rgba(255,255,255,0.6);word-break:break-word}

/* EMPTY */
.empty-state{text-align:center;padding:4rem 2rem;grid-column:1/-1}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:0.3}
.empty-state h3{font-size:1.2rem;font-weight:700;margin-bottom:0.4rem;opacity:0.4}
.empty-state p{font-size:0.88rem;opacity:0.25}

/* TOAST */
.toast{position:fixed;bottom:2rem;right:2rem;padding:0.9rem 1.5rem;border-radius:12px;font-size:0.88rem;display:none;z-index:99999;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,0.4)}
.toast.ok{background:linear-gradient(135deg,#059669,#047857);color:#fff}
.toast.err{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff}

/* MOBILE */
@media(max-width:768px){
    nav{width:calc(100% - 2rem);padding:0.7rem 1rem}
    .nav-links{display:none}
    .hamburger{display:flex}
    .main{padding:5rem 1rem 4rem}
    .posts-grid{grid-template-columns:1fr}
    .modal{padding:1.5rem;margin:0.5rem}
    .modal-title{font-size:1.4rem}
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<nav>
    <div class="nav-logo">✍️ Blog</div>
    <div class="nav-links">
        <a href="index.html" class="nav-link">← Home</a>
        <a href="chat.html" class="nav-link">💬 Chat</a>
        <a href="settings.html" class="nav-link">⚙️</a>
        <a href="login.html" class="nav-link" id="navLogin">Login</a>
    </div>
    <button class="hamburger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </button>
</nav>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
    <button class="mobile-close" onclick="toggleMenu()">✕</button>
    <a href="index.html" onclick="toggleMenu()">🏠 Home</a>
    <a href="chat.html" onclick="toggleMenu()">💬 Chat</a>
    <a href="settings.html" onclick="toggleMenu()">⚙️ Settings</a>
    <a href="login.html" onclick="toggleMenu()">🔐 Login</a>
</div>

<div class="main">
    <div class="blog-header">
        <div class="blog-tag">✍️ Blog & Posts</div>
        <h1>My <span class="grad">Thoughts</span> & Stories</h1>
        <p>Insights, experiences and everything in between</p>
    </div>

    <div class="categories">
        <button class="cat-btn active" onclick="filterCat('all',this)">🌟 All</button>
        <button class="cat-btn" onclick="filterCat('Technology',this)">💻 Technology</button>
        <button class="cat-btn" onclick="filterCat('Coding',this)">🧑‍💻 Coding</button>
        <button class="cat-btn" onclick="filterCat('Life',this)">🌱 Life</button>
        <button class="cat-btn" onclick="filterCat('Other',this)">✨ Other</button>
    </div>

    <!-- CREATE POST — Logged in users ke liye -->
    <div class="create-section" id="createSection">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
            <div style="font-size:1rem;font-weight:700;color:#a78bfa">✍️ Write a Post</div>
        </div>
        <input class="c-input" id="postTitle" placeholder="Post title...">
        <select class="c-select" id="postCat">
            <option value="Technology">💻 Technology</option>
            <option value="Coding">🧑‍💻 Coding</option>
            <option value="Life">🌱 Life</option>
            <option value="Other">✨ Other</option>
        </select>
        <textarea class="c-textarea" id="postContent" placeholder="Write your thoughts here..."></textarea>
        <button class="pub-btn" onclick="publishPost()">🚀 Publish Post</button>
    </div>

    <div class="posts-grid" id="postsGrid">
        <div class="empty-state"><div class="empty-icon">📝</div><h3>Loading posts...</h3></div>
    </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
        <button class="modal-close-btn" onclick="document.getElementById('modalOverlay').classList.remove('open')">✕</button>
        <div id="modalCatBadge"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-meta" id="modalMeta"></div>
        <div class="modal-content" id="modalContent"></div>
        <div class="comments-section">
            <div class="comments-title">💬 Comments</div>
            <div class="comment-input-wrap" id="commentInputWrap">
                <input class="comment-input" id="commentInput" placeholder="Write a comment...">
                <button class="comment-send" onclick="addComment()">Send</button>
            </div>
            <div id="commentsList"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// PARTICLES
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});
const pts=Array.from({length:50},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.2+0.3,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,c:['#667eea','#f093fb','#f5576c'][Math.floor(Math.random()*3)],o:Math.random()*0.2+0.05}));
function drawP(){ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c+Math.floor(p.o*255).toString(16).padStart(2,'0');ctx.fill()});requestAnimationFrame(drawP)}drawP();

const userId=localStorage.getItem('userId');
const username=localStorage.getItem('username');
const role=localStorage.getItem('role');

// Logged in user ko create section dikhao
if(userId) document.getElementById('createSection').classList.add('show');

// Comments localStorage mein store karenge
const commentsDB=JSON.parse(localStorage.getItem('blogComments')||'{}');
const likesDB=JSON.parse(localStorage.getItem('blogLikes')||'{}');

let allPosts=[];
let currentFilter='all';
let currentPostId=null;

function toggleMenu(){document.getElementById('mobileMenu').classList.toggle('open')}

function loadPosts(){
    fetch('https://divyansh-website-wooq.onrender.com/api/blog/posts')
    .then(r=>r.json())
    .then(posts=>{allPosts=posts;renderPosts(posts)})
    .catch(()=>{
        // Demo posts dikhao agar API fail ho
        allPosts=[];
        renderPosts([]);
    });
}

function filterCat(cat,btn){
    currentFilter=cat;
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const filtered=cat==='all'?allPosts:allPosts.filter(p=>p.category===cat);
    renderPosts(filtered);
}

function renderPosts(posts){
    const grid=document.getElementById('postsGrid');
    if(!posts.length){
        grid.innerHTML=`<div class="empty-state">
            <div class="empty-icon">📝</div>
            <h3>No posts yet</h3>
            <p>${userId?'Be the first to write a post!':'Login to write posts!'}</p>
        </div>`;
        return;
    }
    grid.innerHTML=posts.map(p=>{
        const date=new Date(p.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
        const preview=p.content.length>150?p.content.substring(0,150)+'...':p.content;
        const likes=likesDB[p.id]||0;
        const comments=(commentsDB[p.id]||[]).length;
        const canDelete=role==='ADMIN'||(userId&&p.author===username);
        return`<div class="post-card" onclick="openPost(${p.id})">
            <span class="post-cat-badge cat-${p.category}">${p.category}</span>
            <div class="post-title">${escHtml(p.title)}</div>
            <div class="post-preview">${escHtml(preview)}</div>
            <div class="post-footer">
                <div class="post-author-wrap">
                    <div class="p-avatar">${p.author?p.author.charAt(0).toUpperCase():'D'}</div>
                    <span><a href="profile.html?user=${p.author}" onclick="event.stopPropagation()" style="color:inherit;text-decoration:none">${p.author||'Divyansh'}</a></span>
                </div>
                <div style="display:flex;align-items:center;gap:0.6rem">
                    <span class="likes-wrap">❤️ ${likes}</span>
                    <span class="likes-wrap">💬 ${comments}</span>
                    <span class="post-date">${date}</span>
                    ${canDelete?`<button class="del-btn" onclick="event.stopPropagation();delPost(${p.id})">🗑</button>`:''}
                </div>
            </div>
            <span class="read-more">Read more →</span>
        </div>`;
    }).join('');
}

function openPost(id){
    currentPostId=id;
    const post=allPosts.find(p=>p.id===id);
    if(!post)return;
    const date=new Date(post.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
    const likes=likesDB[id]||0;
    document.getElementById('modalCatBadge').innerHTML=`<span class="post-cat-badge cat-${post.category}">${post.category}</span>`;
    document.getElementById('modalTitle').textContent=post.title;
    document.getElementById('modalMeta').innerHTML=`
        <div class="post-author-wrap">
            <div class="p-avatar">${post.author?post.author.charAt(0).toUpperCase():'D'}</div>
            <span>${post.author||'Divyansh'}</span>
        </div>
        <span>${date}</span>
        <button class="like-btn" onclick="likePost(${id})" style="display:flex;align-items:center;gap:0.3rem;color:rgba(255,255,255,0.5);font-size:0.85rem">❤️ <span id="likeCount${id}">${likes}</span></button>`;
    document.getElementById('modalContent').textContent=post.content;

    // Comments dikhao
    if(!userId) document.getElementById('commentInputWrap').style.display='none';
    else document.getElementById('commentInputWrap').style.display='flex';
    renderComments(id);

    document.getElementById('modalOverlay').classList.add('open');
}

function renderComments(postId){
    const comments=commentsDB[postId]||[];
    const list=document.getElementById('commentsList');
    if(!comments.length){
        list.innerHTML='<div style="font-size:0.82rem;color:rgba(255,255,255,0.25);text-align:center;padding:1rem">No comments yet. Be the first!</div>';
        return;
    }
    list.innerHTML=comments.map(c=>`
        <div class="comment-item">
            <div class="comment-author">${c.author} · ${c.time}</div>
            <div class="comment-text">${escHtml(c.text)}</div>
        </div>`).join('');
}

function addComment(){
    if(!userId){showToast('Please login first!','err');return}
    const input=document.getElementById('commentInput');
    const text=input.value.trim();
    if(!text)return;
    if(!commentsDB[currentPostId])commentsDB[currentPostId]=[];
    commentsDB[currentPostId].push({
        author:username,
        text:text,
        time:new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'})
    });
    localStorage.setItem('blogComments',JSON.stringify(commentsDB));
    input.value='';
    renderComments(currentPostId);
    showToast('Comment added!','ok');
    // Update comment count
    loadPosts();
}

function likePost(id){
    if(!userId){showToast('Please login to like!','err');return}
    likesDB[id]=(likesDB[id]||0)+1;
    localStorage.setItem('blogLikes',JSON.stringify(likesDB));
    const el=document.getElementById('likeCount'+id);
    if(el)el.textContent=likesDB[id];
    renderPosts(currentFilter==='all'?allPosts:allPosts.filter(p=>p.category===currentFilter));
}

async function publishPost(){
    if(!userId){showToast('Please login first!','err');return}
    const title=document.getElementById('postTitle').value.trim();
    const content=document.getElementById('postContent').value.trim();
    const category=document.getElementById('postCat').value;
    if(!title||!content){showToast('Please fill all fields!','err');return}
    try{
        const res=await fetch('https://divyansh-website-wooq.onrender.com/api/blog/posts',{
            method:'POST',
            headers:{'Content-Type':'application/json','userId':userId},
            body:JSON.stringify({title,content,category,published:true})
        });
        if(res.ok){
            showToast('Post published! 🎉','ok');
            document.getElementById('postTitle').value='';
            document.getElementById('postContent').value='';
            loadPosts();
        } else {
            const data=await res.json();
            showToast(data.message||'Failed!','err');
        }
    }catch(e){showToast('Failed to publish!','err')}
}

async function delPost(id){
    if(!confirm('Delete this post?'))return;
    try{
        await fetch(`https://divyansh-website-wooq.onrender.com/api/blog/posts/${id}`,{
            method:'DELETE',headers:{'userId':userId}
        });
        showToast('Post deleted!','ok');
        loadPosts();
    }catch(e){showToast('Failed!','err')}
}

function closeModalOutside(e){
    if(e.target===document.getElementById('modalOverlay'))
        document.getElementById('modalOverlay').classList.remove('open');
}

function escHtml(text){
    const d=document.createElement('div');
    d.appendChild(document.createTextNode(text));
    return d.innerHTML;
}

function showToast(msg,type){
    const t=document.getElementById('toast');
    t.textContent=msg;t.className='toast '+type;t.style.display='block';
    setTimeout(()=>t.style.display='none',3000);
}

loadPosts();
</script>
</body>
</html>
